name: Agentic Workflow Lock Files

on:
  pull_request:
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-lock-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install gh-aw (prerelease)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --repo github/gh-aw --limit 1 --json tagName --jq '.[0].tagName')
          echo "GH_AW_TAG=$TAG" >> "$GITHUB_ENV"
          echo "Installing gh-aw $TAG"
          mkdir -p "$RUNNER_TEMP/gh-aw/bin"
          curl -fsSL --retry 3 --retry-delay 5 "https://github.com/github/gh-aw/releases/download/${TAG}/linux-amd64" -o "$RUNNER_TEMP/gh-aw/linux-amd64"
          curl -fsSL --retry 3 --retry-delay 5 "https://github.com/github/gh-aw/releases/download/${TAG}/checksums.txt" -o "$RUNNER_TEMP/gh-aw/checksums.txt"
          (
            cd "$RUNNER_TEMP/gh-aw" &&
            grep ' linux-amd64$' checksums.txt | sha256sum --check --status
          )
          mv "$RUNNER_TEMP/gh-aw/linux-amd64" "$RUNNER_TEMP/gh-aw/bin/gh-aw"
          chmod +x "$RUNNER_TEMP/gh-aw/bin/gh-aw"
          echo "$RUNNER_TEMP/gh-aw/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/gh-aw/bin/gh-aw" version

      - name: Compile agentic workflows
        run: gh-aw compile

      - name: Fail if lock files are stale
        run: |
          if git status --porcelain -- .github/workflows/*.lock.yml | grep -q .; then
            COMMITTED_VERSION=$(grep -h 'gh-aw-metadata' .github/workflows/*.lock.yml | head -1 | sed 's/.*"compiler_version":"\([^"]*\)".*/\1/')
            echo "::error::Lock files are stale."
            echo "::error::Committed lock files were compiled with: ${COMMITTED_VERSION:-unknown}"
            echo "::error::Latest gh-aw prerelease is: $GH_AW_TAG"
            echo "::error::"
            echo "::error::To fix, upgrade gh-aw locally and recompile:"
            echo "::error::  1. gh release download $GH_AW_TAG --repo github/gh-aw --pattern darwin-arm64 --dir /tmp/gh-aw"
            echo "::error::  2. cp /tmp/gh-aw/darwin-arm64 \$(find ~/.local/share/gh/extensions/gh-aw -name gh-aw -type f) && chmod +x \$(find ~/.local/share/gh/extensions/gh-aw -name gh-aw -type f)"
            echo "::error::  3. gh aw compile && git add .github/workflows/*.lock.yml .github/aw/ && git commit -m 'chore: recompile lock files'"
            echo ""
            echo "Changed files:"
            git --no-pager diff --stat -- .github/workflows/*.lock.yml
            echo ""
            git --no-pager diff -- .github/workflows/*.lock.yml
            exit 1
          fi
